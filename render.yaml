services:
  # Django Backend (Python)
  - type: web
    name: expense-django
    runtime: python
    rootDir: django-backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn expense_backend.wsgi:application
    envVars:
      - key: MONGO_URI
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com

  # Node.js API Gateway
  - type: web
    name: expense-node
    runtime: node
    rootDir: node-backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DJANGO_API_URL
        fromService:
          name: expense-django
          type: web
          property: host

  # React Frontend (Static Site)
  - type: static
    name: expense-frontend
    rootDir: client
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: expense-node
          type: web
          property: host
        suffix: /api
