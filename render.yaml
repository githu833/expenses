services:
  # Django Backend (Python)
  - type: web
    name: expense-django
    runtime: python
    rootDir: django-backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn expense_backend.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: MONGO_URI
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: "*"
      - key: PYTHON_VERSION
        value: 3.10.12

  # Node.js API Gateway
  - type: web
    name: expense-node
    runtime: node
    rootDir: node-backend
    buildCommand: "npm install --legacy-peer-deps"
    startCommand: "node server.js"
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: 20.10.0
      - key: DJANGO_API_URL
        value: http://expense-django:10000

  # React Frontend (Static Site)
  - type: static
    name: expense-frontend
    rootDir: client
    buildCommand: "npm install --legacy-peer-deps && npm run build"
    publishPath: "dist"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: expense-node
          type: web
          property: url
        suffix: /api
      - key: NODE_VERSION
        value: 20.10.0
